apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No `namespace:` directive: the interceptor Ingress must stay in `keda`; the
# workload resources carry no namespace and Argo injects the Application's
# destination namespace (sdk-apps-stg).

resources:
  - ../../services/stg-race0
  - stg-race0-config.yaml
  - stg-race0-sealedsecret.yaml
  - stg-race0-httpscaledobject.yaml
  - stg-race0-interceptor-ingress.yaml

patches:
  # Drop the direct ALB Ingress: in stg the app is fronted through the KEDA
  # interceptor so a scaled-to-zero Deployment is woken by the first request.
  - target:
      kind: Ingress
      name: stg-race0
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: stg-race0

# Per-service image (defaults to the shared dev ECR sdk-example:<repo>; an
# independent deployment may pin a different tag/image).
images:
  - name: stg-race0
    newName: 368076259134.dkr.ecr.us-east-1.amazonaws.com/sdk-example
    newTag: sdk-race
