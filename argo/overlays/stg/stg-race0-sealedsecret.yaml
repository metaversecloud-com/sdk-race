# No clear secrets in git. Ciphertext only; the in-cluster sealed-secrets
# controller unseals it into Secret stg-race0-secrets (envFrom). Sealed (strict
# scope) against the dev cluster cert for namespace sdk-apps-stg.
# Re-seal:  kubeseal --cert sealed-secrets-dev.pem --format yaml \
#             --namespace sdk-apps-stg --name stg-race0-secrets < raw-secret.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: stg-race0-secrets
  namespace: sdk-apps-stg
spec:
  encryptedData:
    INTERACTIVE_SECRET: 
  template:
    metadata:
      name: stg-race0-secrets
      namespace: sdk-apps-stg
    type: Opaque
