apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No `namespace:` directive: the interceptor Ingress must stay in `keda`; the
# workload resources carry no namespace and Argo injects the Application's
# destination namespace (sdk-apps-dev).

resources:
  - ../../services/race0
  - race0-config.yaml
  - race0-sealedsecret.yaml
  - race0-httpscaledobject.yaml
  - race0-interceptor-ingress.yaml

patches:
  # Drop the direct ALB Ingress: in dev the app is fronted through the KEDA
  # interceptor so a scaled-to-zero Deployment is woken by the first request.
  - target:
      kind: Ingress
      name: race0
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: race0

# Per-service image (defaults to the shared dev ECR sdk-example:<repo>; an
# independent deployment may pin a different tag/image).
images:
  - name: race0
    newName: 368076259134.dkr.ecr.us-east-1.amazonaws.com/sdk-example
    newTag: sdk-race
