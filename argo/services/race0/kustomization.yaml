apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Workload template for the `race0` service. Reusable across envs; the overlay
# adds the KEDA scaler + interceptor and drops the direct Ingress.
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/name: race0
    includeSelectors: false
